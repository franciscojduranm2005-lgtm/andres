<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar sesión — CONECTADOS EXPRESS</title>
  <meta name="description" content="Acceso al panel de administración de CONECTADOS EXPRESS.">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="min-h-screen flex items-center justify-center bg-gradient-to-br from-[#0d1b2a] via-[#0056b3] to-[#003880]">

<div id="toast"></div>

<div class="w-full max-w-md mx-4">
  <!-- Card -->
  <div class="bg-white rounded-2xl shadow-2xl overflow-hidden">

    <!-- Header -->
    <div class="bg-[#0056b3] px-8 py-8 text-center">
      <img src="imagen_12.jpeg" alt="Logo" class="h-14 mx-auto mb-4 object-contain"
           onerror="this.outerHTML='<p class=\'text-white font-extrabold text-2xl\'>⚡ CONECTADOS</p>'">
      <h1 id="auth-title" class="text-white text-xl font-bold">Iniciar Sesión</h1>
      <p id="auth-subtitle" class="text-white/70 text-sm mt-1">Ingresa tus credenciales para continuar</p>
    </div>

    <!-- Mode Toggle -->
    <div class="flex border-b border-gray-100">
      <button id="mode-login" class="flex-1 py-3 text-sm font-semibold text-brand-blue border-b-2 border-brand-blue bg-gray-50/50">Ingresar</button>
      <button id="mode-register" class="flex-1 py-3 text-sm font-semibold text-gray-400 hover:text-gray-600 transition-colors">Crear Cuenta</button>
    </div>

    <!-- Form -->
    <form id="auth-form" class="px-8 py-8 space-y-5">
      <div id="name-field" class="hidden">
        <label class="form-label" for="full_name">Nombre completo</label>
        <input id="full_name" name="full_name" type="text"
               class="form-input" placeholder="Ej: Andrés Pérez">
      </div>
      <div>
        <label class="form-label" for="usuario">Usuario o Correo</label>
        <input id="usuario" name="usuario" type="text" required autocomplete="username"
               class="form-input" placeholder="Ej: andres">
      </div>
      <div>
        <label class="form-label" for="password">Contraseña</label>
        <div class="relative">
          <input id="password" name="password" type="password" required autocomplete="current-password"
                 class="form-input pr-10" placeholder="••••••••">
          <button type="button" id="toggle-pw"
                  class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600">
            <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
            </svg>
          </button>
        </div>
      </div>

      <button id="auth-btn" type="submit" class="btn-blue w-full justify-center py-3 text-base">
        Iniciar Sesión
      </button>

      <p id="auth-error" class="text-center text-sm text-red-600 hidden"></p>

      <p class="text-center text-sm text-gray-500">
        <a href="index.html" class="text-brand-blue hover:underline">← Volver a la tienda</a>
      </p>
    </form>
  </div>

  <p class="text-center text-white/50 text-xs mt-6">© 2026 CONECTADOS EXPRESS</p>
</div>

<script type="module">
  import { supabase, getUser, signIn } from './supabase-client.js';

  let mode = 'login';

  // If already logged in redirect to admin
  if (getUser()) window.location.href = 'admin.html';

  const btnLogin  = document.getElementById('mode-login');
  const btnReg    = document.getElementById('mode-register');
  const title     = document.getElementById('auth-title');
  const subtitle  = document.getElementById('auth-subtitle');
  const nameField = document.getElementById('name-field');
  const authBtn   = document.getElementById('auth-btn');

  function setMode(newMode) {
    mode = newMode;
    if (mode === 'login') {
      title.textContent = 'Iniciar Sesión';
      subtitle.textContent = 'Ingresa tus credenciales para continuar';
      authBtn.textContent = 'Iniciar Sesión';
      nameField.classList.add('hidden');
      btnLogin.classList.add('text-brand-blue', 'border-brand-blue', 'bg-gray-50/50');
      btnLogin.classList.remove('text-gray-400');
      btnReg.classList.remove('text-brand-blue', 'border-brand-blue', 'bg-gray-50/50');
      btnReg.classList.add('text-gray-400');
    } else {
      title.textContent = 'Crear Cuenta';
      subtitle.textContent = 'Regístrate para empezar a comprar';
      authBtn.textContent = 'Registrarse';
      nameField.classList.remove('hidden');
      btnReg.classList.add('text-brand-blue', 'border-brand-blue', 'bg-gray-50/50');
      btnReg.classList.remove('text-gray-400');
      btnLogin.classList.remove('text-brand-blue', 'border-brand-blue', 'bg-gray-50/50');
      btnLogin.classList.add('text-gray-400');
    }
  }

  btnLogin.addEventListener('click', (e) => { e.preventDefault(); setMode('login'); });
  btnReg.addEventListener('click', (e) => { e.preventDefault(); setMode('register'); });

  // Toggle password
  document.getElementById('toggle-pw').addEventListener('click', () => {
    const pw = document.getElementById('password');
    pw.type = pw.type === 'password' ? 'text' : 'password';
  });

  document.getElementById('auth-form').addEventListener('submit', async e => {
    e.preventDefault();
    const btn   = document.getElementById('auth-btn');
    const errEl = document.getElementById('auth-error');
    btn.textContent = mode === 'login' ? 'Ingresando...' : 'Creando cuenta...';
    btn.disabled = true;
    errEl.classList.add('hidden');

    const usuario  = e.target.usuario.value.trim();
    const password = e.target.password.value;
    const fullName = e.target.full_name?.value.trim();

    if (mode === 'login') {
      try {
        await signIn(usuario, password);
        btn.textContent = '✓ Acceso concedido';
        setTimeout(() => window.location.href = 'admin.html', 800);
      } catch (error) {
        console.error(error);
        errEl.textContent = 'Error: ' + (error.message || 'Credenciales incorrectas');
        errEl.classList.remove('hidden');
        btn.textContent = 'Iniciar Sesión';
        btn.disabled = false;
      }
    } else {
      // REGISTER (using standard Supabase Auth)
      const { data, error } = await supabase.auth.signUp({ 
        email: usuario.includes('@') ? usuario : (usuario + '@gmail.com'), 
        password: password,
        options: { data: { full_name: fullName } }
      });
      if (error) {
        errEl.textContent = 'Error: ' + error.message;
        errEl.classList.remove('hidden');
        btn.textContent = 'Registrarse';
        btn.disabled = false;
      } else {
        btn.textContent = data.session ? '✓ Cuenta creada' : '✓ Revisa tu correo';
        errEl.textContent = data.session ? 'Iniciando sesión...' : 'Te hemos enviado un correo de confirmación.';
        errEl.classList.remove('hidden');
        errEl.classList.add('text-green-600');
      }
    }
  });
</script>
</body>
</html>
